<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="wachat">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <meta name="theme-color" content="#2563EB"/>

  <!-- Favicon (id dipakai untuk badge unread dinamis) -->
  <link id="appicon" rel="icon" type="image/svg+xml" href="favicon.svg"/>

  <title>WAChat</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>

  <!-- Banner pasang PWA: muncul di bawah bila app belum terpasang -->
  <div id="pwa-install" style="display:none; position:fixed; left:12px; right:12px; bottom:12px; z-index:99999; background:#202c33; color:#fff; border-radius:12px; padding:10px 12px; align-items:center; gap:12px; box-shadow:0 6px 24px rgba(0,0,0,.35); font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif">
    <img src="icons/Icon-192.png" width="42" height="42" style="border-radius:9px"/>
    <div style="flex:1; min-width:0">
      <div style="font-weight:600">Pasang WAChat</div>
      <div style="font-size:12px; color:#8696a0">Akses lebih cepat dari layar utama</div>
    </div>
    <button id="pwa-install-btn" style="background:#00a884; color:#fff; border:none; padding:9px 16px; border-radius:8px; font-weight:600; cursor:pointer">Pasang</button>
    <button id="pwa-install-close" aria-label="Tutup" style="background:transparent; color:#8696a0; border:none; font-size:22px; cursor:pointer; line-height:1">&times;</button>
  </div>
  <script>
    (function () {
      var deferredPrompt = null;
      var banner = function () { return document.getElementById('pwa-install'); };
      function hide() { var b = banner(); if (b) b.style.display = 'none'; }
      function show() { var b = banner(); if (b) b.style.display = 'flex'; }

      window.addEventListener('beforeinstallprompt', function (e) {
        e.preventDefault();
        deferredPrompt = e;
        // Jangan tampilkan kalau sudah berjalan sebagai PWA terpasang.
        var installed = window.matchMedia('(display-mode: standalone)').matches ||
          window.navigator.standalone === true;
        if (!installed) show();
      });
      window.addEventListener('appinstalled', function () { hide(); deferredPrompt = null; });

      document.addEventListener('click', function (ev) {
        if (ev.target && ev.target.id === 'pwa-install-btn') {
          hide();
          if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt.userChoice.finally(function(){ deferredPrompt = null; }); }
        } else if (ev.target && ev.target.id === 'pwa-install-close') {
          hide();
        }
      });
    })();
  </script>
</body>
</html>
